name: Quality Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_NAME: "Teemu Välimäki"
          NEXT_PUBLIC_EMAIL_USER: "TeemuValimaki"
          NEXT_PUBLIC_EMAIL_DOMAIN: "proton.me"
          NEXT_PUBLIC_GITHUB_URL: "https://github.com/Dolez777"
          NEXT_PUBLIC_LINKEDIN_URL: "https://www.linkedin.com/in/teemu-valimaki/"
          NEXT_PUBLIC_FORMSPREE_KEY: ${{ secrets.NEXT_PUBLIC_FORMSPREE_KEY }}

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Component tests (Vitest)
        run: npm run test

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: E2E tests (Playwright)
        run: npm run test:e2e

      - name: Lighthouse CI
        run: npm run lhci
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            playwright-report/
            .lighthouseci/
            test-results/
